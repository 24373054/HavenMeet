    <script>
      var seconds = Math.max(2, parseInt(Math.random() * 5))
      var $left = document.getElementById('leftTime')
      var $refresh = document.getElementById('refresh-btn')

      function isApp () {
        return (/\bXHS\//.test(window.navigator.userAgent) || window.location.href.indexOf('clientsource=app') > -1)
      }

      function refresh () {
        if (seconds > 0) {
          return
        }
        window.location.reload()
      }

      function goShopping () {
        // if (!isApp()) {
        //   window.location.href = 'https://www.xiaohongshu.com'
        //   return
        // }
        var url = ''
        if (window.navigator.userAgent.match(/.*OS\s([\d_]+)/)) {
          url = 'xhsdiscover://home/store'
        } else {
          url = 'xhsdiscover://store'
        }

        window.location.href = url
      }

      var time = setInterval(function() {
        if (seconds === 0) {
          $refresh.innerHTML = '刷新试试'
          $refresh.setAttribute('class', 'error-page-btn cube-button --default --large owl-imp-showed')
          clearInterval(time)
          return
        }
        $refresh.innerHTML = '刷新试试('+ seconds +')'
        seconds --
      }, 1000)

    </script>
